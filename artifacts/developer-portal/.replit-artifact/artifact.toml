kind = "web"
previewPath = "/developers/"
title = "KobeAI Developer Portal"
version = "1.0.0"
id = "artifacts/developer-portal"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/developers/" ]
localPort = 19308

[services.development]
run = "pnpm --filter @workspace/developer-portal run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/developer-portal", "run", "build" ]
publicDir = "artifacts/developer-portal/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "19308"
BASE_PATH = "/developers/"
