kind = "web"
previewPath = "/"
title = "KobeAI Teacher Dashboard"
version = "1.0.0"
id = "artifacts/teacher-dashboard"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 19546

[services.development]
run = "pnpm --filter @workspace/teacher-dashboard run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/teacher-dashboard", "run", "build" ]
publicDir = "artifacts/teacher-dashboard/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "19546"
BASE_PATH = "/"
