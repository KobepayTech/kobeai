kind = "web"
previewPath = "/parent/"
title = "KobeAI Parent App"
version = "1.0.0"
id = "artifacts/parent-app"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/parent/" ]
localPort = 22606

[services.development]
run = "pnpm --filter @workspace/parent-app run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/parent-app", "run", "build" ]
publicDir = "artifacts/parent-app/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "22606"
BASE_PATH = "/parent/"
