# =============================================================================
# TLS overlay — replaces the nginx front door with Caddy, which auto-issues
# and renews Let's Encrypt certificates for ${DOMAIN}.
#
# Usage:
#   docker compose -f docker-compose.yml -f docker-compose.tls.yml up -d
#
# Requirements:
#   - DOMAIN must be set in .env to a real DNS name pointing at this server.
#   - Ports 80 and 443 must be reachable from the public internet for the
#     ACME HTTP-01 challenge to succeed.
# =============================================================================

services:
  nginx:
    # Disable the plain-HTTP nginx front door when TLS is enabled.
    profiles: ["disabled"]

  caddy:
    image: caddy:2-alpine
    container_name: kobeai-caddy
    restart: unless-stopped
    depends_on: [backend, teacher, parent]
    environment:
      DOMAIN: ${DOMAIN}
      ADMIN_EMAIL: ${ADMIN_EMAIL:-admin@example.com}
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./Caddyfile:/etc/caddy/Caddyfile:ro
      - ./data/caddy:/data
      - ./data/caddy-config:/config
    networks: [kobeai]
