# Front-door nginx for the school server.
# Routes:
#   /            -> Parent app   (default for parents on phones)
#   /teacher/    -> Teacher dashboard
#   /api/        -> Backend API (also what the watches hit)
#   /ai/         -> Ollama (debug only)
#   /health      -> liveness probe

upstream kobeai_backend  { server backend:8000; }
upstream kobeai_teacher  { server teacher:80;   }
upstream kobeai_parent   { server parent:80;    }
upstream kobeai_ollama   { server ollama:11434; }

server {
    listen 80 default_server;
    server_name _;

    client_max_body_size 25m;

    location = /health {
        return 200 "ok\n";
        add_header Content-Type text/plain;
    }

    location /api/ {
        proxy_pass         http://kobeai_backend;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 120s;
    }

    location /ai/ {
        proxy_pass         http://kobeai_ollama/;
        proxy_http_version 1.1;
        proxy_read_timeout 300s;
    }

    location /teacher/ {
        proxy_pass         http://kobeai_teacher/;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
    }

    location / {
        proxy_pass         http://kobeai_parent;
        proxy_http_version 1.1;
        proxy_set_header   Host $host;
    }
}
