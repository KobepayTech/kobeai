set default=0
set timeout=15
set timeout_style=menu

# Sane fonts/colours for the installer screen.
loadfont unicode
set menu_color_normal=white/black
set menu_color_highlight=black/light-gray

menuentry "Install KobeAI MASTER node (laptop)" {
    set gfxpayload=keep
    linux /casper/vmlinuz quiet \
        autoinstall \
        ds=nocloud\;s=/cdrom/autoinstall/master/ \
        kobeai_role=master \
        ---
    initrd /casper/initrd
}

menuentry "Install KobeAI WORKER node (desktop / Ollama box)" {
    set gfxpayload=keep
    linux /casper/vmlinuz quiet \
        autoinstall \
        ds=nocloud\;s=/cdrom/autoinstall/worker/ \
        kobeai_role=worker \
        ---
    initrd /casper/initrd
}

menuentry "Try Ubuntu Server (live, no install)" {
    set gfxpayload=keep
    linux /casper/vmlinuz quiet ---
    initrd /casper/initrd
}

menuentry "Boot from existing OS on disk" {
    exit
}

menuentry "Recovery shell (advanced)" {
    set gfxpayload=keep
    linux /casper/vmlinuz quiet single ---
    initrd /casper/initrd
}
